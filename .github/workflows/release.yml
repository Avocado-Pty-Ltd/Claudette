name: Release

# Two ways to cut a release:
#
#   1. Push a v* tag from your terminal:
#        git tag v0.2.0 -m "Claudette 0.2.0" && git push origin v0.2.0
#      The `push` trigger below builds that exact tag.
#
#   2. Actions → Release → "Run workflow" → pick patch / minor / major.
#      The workflow reads the latest existing vMAJOR.MINOR.PATCH tag,
#      bumps the requested component, creates the new tag at the current
#      main HEAD, then builds it. No terminal round-trip needed.

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump — creates the next tag at current HEAD.'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  build:
    # macos-15 (Sequoia) ships Xcode 16 / Swift 6 by default. macos-14 gave us
    # Swift 5.10, which can't build a package that declares
    # `swift-tools-version: 6.0` — and Claudette targets .macOS(.v15) so the
    # newer SDK is the right match anyway.
    runs-on: macos-15
    permissions:
      contents: write   # needed to create the tag + Release
    steps:
      - name: Resolve tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Tag-push trigger — the ref that triggered us IS the tag.
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Building pushed tag: $TAG"
          else
            # Manual dispatch — compute the next semver tag from the requested
            # bump, then create it at the current commit.
            BUMP="${{ github.event.inputs.bump }}"
            # `sort -V` gives semver-ish ordering; strict vX.Y.Z tags only, so
            # pre-releases (v0.1.0-rc1) don't get confused with real releases.
            LATEST=$(gh api "repos/${GITHUB_REPOSITORY}/tags" --paginate --jq '.[].name' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -1 \
              || true)
            if [[ -z "$LATEST" ]]; then
              # Bootstrap — no vX.Y.Z tags yet.
              TAG="v0.1.0"
              echo "No existing tags found. Bootstrapping at $TAG."
            else
              VERSION="${LATEST#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              case "$BUMP" in
                major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
                minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
                patch) PATCH=$((PATCH + 1)) ;;
                *) echo "::error::Unknown bump: $BUMP"; exit 1 ;;
              esac
              TAG="v${MAJOR}.${MINOR}.${PATCH}"
              echo "Bumping ${LATEST} → ${TAG}  (${BUMP})"
            fi
            # Refuse to overwrite an existing tag — the API returns 422 in
            # that case anyway, but a clearer error message helps.
            if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error title=Tag collision::Tag ${TAG} already exists. Push a new commit and try again, or pick a different bump."
              exit 1
            fi
            # Create the tag on origin at the commit this workflow was
            # dispatched from (`github.sha`, not "current main HEAD" — that
            # keeps the commit-tagged deterministic even if main advances
            # between when the button was clicked and when this step runs).
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f "ref=refs/tags/${TAG}" \
              -f "sha=${GITHUB_SHA}" >/dev/null
            echo "Created tag ${TAG} → ${GITHUB_SHA}"
          fi
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build Claudette.app
        run: ./build.sh

      - name: Zip .app
        run: |
          cd build
          # ditto preserves resource forks / xattrs / signature better than `zip`
          # for macOS app bundles.
          ditto -c -k --sequesterRsrc --keepParent Claudette.app Claudette.app.zip
          ls -lh Claudette.app.zip

      - name: Install create-dmg
        # Homebrew is preinstalled on macos-15; create-dmg is a small wrapper
        # around hdiutil that produces a proper macOS installer window with the
        # app icon + /Applications drop-link, matching what people expect when
        # they double-click a .dmg from a GitHub release.
        run: brew install create-dmg

      - name: Build .dmg installer
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          # Strip the leading `v` from the filename — Claudette-0.2.0.dmg is
          # the idiomatic macOS naming, not Claudette-v0.2.0.dmg.
          VERSION="${TAG#v}"
          DMG="Claudette-${VERSION}.dmg"
          cd build
          # create-dmg exits non-zero when it can't sign the DMG, which is
          # expected on an ad-hoc-signed build (see create-dmg#72). We swallow
          # that non-zero here so signing-only failures don't blow up the job,
          # then verify explicitly below — a bare `|| test -f` guard would
          # also let through zero-byte or corrupted DMGs.
          create-dmg \
            --volname "Claudette ${VERSION}" \
            --volicon "../icon/Claudette.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Claudette.app" 180 200 \
            --hide-extension "Claudette.app" \
            --app-drop-link 480 200 \
            --no-internet-enable \
            "${DMG}" \
            "Claudette.app" \
            || true
          # Post-hoc integrity checks — any of these failing fails the step.
          if [[ ! -f "${DMG}" ]]; then
            echo "::error title=DMG missing::create-dmg did not produce ${DMG}"; exit 1
          fi
          DMG_SIZE_BYTES=$(stat -f %z "${DMG}")
          # Claudette.app is several MB uncompressed; a valid installer will
          # sit well above 1 MB. Anything smaller is a truncated / empty DMG.
          if (( DMG_SIZE_BYTES < 1048576 )); then
            echo "::error title=DMG too small::${DMG} is only ${DMG_SIZE_BYTES} bytes — expected > 1 MiB"; exit 1
          fi
          # `hdiutil verify` walks the DMG's checksum + master directory. A
          # corrupted-but-non-empty DMG fails here, catching the failure mode
          # the previous `|| test -f` guard would have let through.
          hdiutil verify "${DMG}"
          ls -lh Claudette-*.dmg

      - name: SHA256 checksums
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          cd build
          shasum -a 256 Claudette.app.zip       > Claudette.app.zip.sha256
          shasum -a 256 "Claudette-${VERSION}.dmg" > "Claudette-${VERSION}.dmg.sha256"
          cat Claudette.app.zip.sha256
          cat "Claudette-${VERSION}.dmg.sha256"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"

          # Idempotent: on a first cut we create a draft release from scratch;
          # on a re-run (via the Actions "Re-run" button) we upload with
          # --clobber so the retried build's artifacts replace the previous
          # ones without failing on "release already exists".
          #
          # A published (non-draft) release is treated as immutable — we refuse
          # to overwrite it so a retry can't silently mutate what users have
          # already downloaded.
          ASSETS=(
            "build/Claudette-${VERSION}.dmg"
            "build/Claudette-${VERSION}.dmg.sha256"
            "build/Claudette.app.zip"
            "build/Claudette.app.zip.sha256"
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            if [[ "$IS_DRAFT" != "true" ]]; then
              echo "::error::Release $TAG is already published; refusing to overwrite. Delete or unpublish it first, or push a new tag."
              exit 1
            fi
            echo "Release $TAG already exists as a draft — uploading new assets with --clobber."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "Creating fresh draft release $TAG."
            # --draft so a human reviews the notes before making it public.
            # --generate-notes uses GitHub's commit-based auto-notes as a starting point.
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
