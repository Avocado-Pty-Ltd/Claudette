name: Release

# Triggered by pushing a v* tag (e.g. v0.1.0). Runs on a fresh macOS runner,
# builds Claudette.app, zips it, and attaches the zip + a SHA256 checksum to
# a DRAFT GitHub Release. Edit the notes and publish when ready.

on:
  push:
    tags:
      - 'v*'

  # Manual trigger — pick a tag from the UI to re-run against.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Must already exist.'
        required: true

jobs:
  build:
    # macos-15 (Sequoia) ships Xcode 16 / Swift 6 by default. macos-14 gave us
    # Swift 5.10, which can't build a package that declares
    # `swift-tools-version: 6.0` — and Claudette targets .macOS(.v15) so the
    # newer SDK is the right match anyway.
    runs-on: macos-15
    permissions:
      contents: write   # needed to create the Release
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build Claudette.app
        run: ./build.sh

      - name: Zip .app
        run: |
          cd build
          # ditto preserves resource forks / xattrs / signature better than `zip`
          # for macOS app bundles.
          ditto -c -k --sequesterRsrc --keepParent Claudette.app Claudette.app.zip
          ls -lh Claudette.app.zip

      - name: Install create-dmg
        # Homebrew is preinstalled on macos-15; create-dmg is a small wrapper
        # around hdiutil that produces a proper macOS installer window with the
        # app icon + /Applications drop-link, matching what people expect when
        # they double-click a .dmg from a GitHub release.
        run: brew install create-dmg

      - name: Build .dmg installer
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          # Strip the leading `v` from the filename — Claudette-0.2.0.dmg is
          # the idiomatic macOS naming, not Claudette-v0.2.0.dmg.
          VERSION="${TAG#v}"
          DMG="Claudette-${VERSION}.dmg"
          cd build
          # create-dmg exits non-zero when it can't sign the DMG, which is
          # expected on an ad-hoc-signed build (see create-dmg#72). We swallow
          # that non-zero here so signing-only failures don't blow up the job,
          # then verify explicitly below — a bare `|| test -f` guard would
          # also let through zero-byte or corrupted DMGs.
          create-dmg \
            --volname "Claudette ${VERSION}" \
            --volicon "../icon/Claudette.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Claudette.app" 180 200 \
            --hide-extension "Claudette.app" \
            --app-drop-link 480 200 \
            --no-internet-enable \
            "${DMG}" \
            "Claudette.app" \
            || true
          # Post-hoc integrity checks — any of these failing fails the step.
          if [[ ! -f "${DMG}" ]]; then
            echo "::error title=DMG missing::create-dmg did not produce ${DMG}"; exit 1
          fi
          DMG_SIZE_BYTES=$(stat -f %z "${DMG}")
          # Claudette.app is several MB uncompressed; a valid installer will
          # sit well above 1 MB. Anything smaller is a truncated / empty DMG.
          if (( DMG_SIZE_BYTES < 1048576 )); then
            echo "::error title=DMG too small::${DMG} is only ${DMG_SIZE_BYTES} bytes — expected > 1 MiB"; exit 1
          fi
          # `hdiutil verify` walks the DMG's checksum + master directory. A
          # corrupted-but-non-empty DMG fails here, catching the failure mode
          # the previous `|| test -f` guard would have let through.
          hdiutil verify "${DMG}"
          ls -lh Claudette-*.dmg

      - name: SHA256 checksums
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          cd build
          shasum -a 256 Claudette.app.zip       > Claudette.app.zip.sha256
          shasum -a 256 "Claudette-${VERSION}.dmg" > "Claudette-${VERSION}.dmg.sha256"
          cat Claudette.app.zip.sha256
          cat "Claudette-${VERSION}.dmg.sha256"

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"

          # Idempotent: on a first cut we create a draft release from scratch;
          # on a re-run (or manual workflow_dispatch against an existing tag)
          # we upload with --clobber so the retried build's artifacts replace
          # the previous ones without failing on "release already exists".
          #
          # A published (non-draft) release is treated as immutable — we refuse
          # to overwrite it so a retry can't silently mutate what users have
          # already downloaded.
          ASSETS=(
            "build/Claudette-${VERSION}.dmg"
            "build/Claudette-${VERSION}.dmg.sha256"
            "build/Claudette.app.zip"
            "build/Claudette.app.zip.sha256"
          )
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq .isDraft)
            if [[ "$IS_DRAFT" != "true" ]]; then
              echo "::error::Release $TAG is already published; refusing to overwrite. Delete or unpublish it first, or push a new tag."
              exit 1
            fi
            echo "Release $TAG already exists as a draft — uploading new assets with --clobber."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "Creating fresh draft release $TAG."
            # --draft so a human reviews the notes before making it public.
            # --generate-notes uses GitHub's commit-based auto-notes as a starting point.
            gh release create "$TAG" \
              --draft \
              --title "$TAG" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
